[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# /api/login → função login.js, /api/viagens → função viagens.js, etc.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Fallback de SPA: qualquer outra rota cai no index.html (React Router cuida do resto).
# Precisa vir DEPOIS do /api/* para não capturar as chamadas de API.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cabeçalhos de segurança aplicados a todas as respostas.
[[headers]]
  for = "/*"
  [headers.values]
    # Impede que o site seja embutido em <iframe> de outros domínios (anti-clickjacking).
    X-Frame-Options = "DENY"
    # Bloqueia "MIME sniffing" — o navegador respeita o Content-Type declarado.
    X-Content-Type-Options = "nosniff"
    # Não vaza a URL completa (com query) para sites externos.
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Desliga APIs sensíveis que o site não usa.
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Força HTTPS por 1 ano (a Netlify já serve em HTTPS).
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # CSP: define de onde recursos podem ser carregados. Cobre as fontes que o
    # site realmente usa — Cloudinary (imagens), Google Maps e WhatsApp (iframes/links).
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https://res.cloudinary.com https://images.unsplash.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://api.cloudinary.com; frame-src https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

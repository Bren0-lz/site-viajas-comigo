<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhes da viagem · Viajas Comigo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0c0c0d;--black-soft:#141416;--panel:#1a1a1d;--gold:#c9a24b;--gold-soft:#d9bd7a;
    --cream:#f4f1ea;--muted:#9a968d;--line:rgba(201,162,75,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--black);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;line-height:1.6}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.12}
  a{color:inherit;text-decoration:none}
  .wrap{width:100%;max-width:1140px;margin:0 auto;padding:0 22px}
  .btn{display:inline-flex;align-items:center;gap:9px;padding:14px 26px;border-radius:40px;font-weight:500;font-size:.95rem;cursor:pointer;border:1px solid var(--gold);transition:.25s}
  .btn-solid{background:var(--gold);color:#1a1407}
  .btn-solid:hover{background:var(--gold-soft);transform:translateY(-2px)}
  .btn-ghost{background:transparent;color:var(--gold)}
  .btn-ghost:hover{background:rgba(201,162,75,.1)}
  header{position:fixed;top:0;left:0;right:0;z-index:50;background:transparent;transition:.3s}
  header.scrolled{background:rgba(12,12,13,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:68px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:700}
  .brand .mark{width:32px;height:32px;border:1.5px solid var(--gold);border-radius:50%;display:grid;place-items:center;color:var(--gold)}
  .back{font-size:.88rem;color:#e9e5da;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .back:hover{color:#fff}
  .hero{position:relative;height:86vh;min-height:520px;display:flex;align-items:flex-end;background-size:cover;background-position:center;cursor:zoom-in}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(12,12,13,.05) 35%,rgba(12,12,13,.5) 70%,rgba(12,12,13,.96))}
  .hero-content{position:relative;z-index:2;padding-bottom:48px}
  .badge{display:inline-block;background:rgba(12,12,13,.6);color:var(--gold);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;padding:7px 15px;border-radius:30px;border:1px solid var(--line);margin-bottom:16px;backdrop-filter:blur(4px)}
  .badge.esgotado{color:#e08a8a}
  .hero h1{font-size:clamp(2.6rem,7vw,5rem);margin-bottom:10px;text-shadow:0 2px 20px rgba(0,0,0,.5)}
  .hero .meta{color:#ece8dd;font-size:1.15rem;letter-spacing:.03em;text-shadow:0 1px 10px rgba(0,0,0,.5)}
  .hero .count{position:absolute;right:22px;bottom:26px;z-index:2;background:rgba(12,12,13,.6);border:1px solid var(--line);color:var(--cream);font-size:.8rem;padding:7px 14px;border-radius:30px;backdrop-filter:blur(4px)}
  .layout{display:grid;grid-template-columns:1fr 350px;gap:48px;padding:60px 0}
  .lead{font-size:1.18rem;color:#e0dcd1;margin-bottom:36px;line-height:1.75}
  .block{margin-bottom:52px}
  .block h2{font-size:2rem;margin-bottom:22px;display:flex;align-items:center;gap:12px}
  .block h2 .dot{width:8px;height:8px;background:var(--gold);border-radius:50%;display:inline-block}
  .inclusos{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .inclusos li{display:flex;gap:11px;color:#d4d0c5;font-size:.97rem}
  .inclusos .ck{color:var(--gold);flex:0 0 auto}
  .roteiro{list-style:none;position:relative;padding-left:6px}
  .roteiro li{position:relative;padding:0 0 18px 26px;border-left:1px solid var(--line);margin-left:6px}
  .roteiro li:last-child{border-left:1px solid transparent}
  .roteiro li::before{content:"";position:absolute;left:-5px;top:5px;width:10px;height:10px;background:var(--gold);border-radius:50%}
  .roteiro li b{color:var(--cream);font-weight:600}
  .roteiro li span{color:var(--muted)}
  .galeria{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .galeria .g-item{position:relative;overflow:hidden;border-radius:14px;border:1px solid var(--line);cursor:zoom-in;background:var(--panel)}
  .galeria .g-item img{width:100%;height:300px;object-fit:cover;display:block;transition:transform .6s ease}
  .galeria .g-item:hover img{transform:scale(1.06)}
  .galeria .feat{grid-column:1 / -1}
  .galeria .feat img{height:440px}
  .sv-wrap{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);cursor:pointer;display:block}
  .sv-wrap img{width:100%;height:360px;object-fit:cover;display:block}
  .sv-wrap .sv-cta{position:absolute;left:16px;bottom:14px;background:rgba(12,12,13,.78);border:1px solid var(--line);color:var(--cream);font-size:.85rem;padding:8px 15px;border-radius:30px;backdrop-filter:blur(4px)}
  .sv-note{color:var(--muted);font-size:.85rem;margin-top:10px}
  .mapa iframe{width:100%;height:380px;border:1px solid var(--line);border-radius:16px;filter:grayscale(.3) contrast(1.05)}
  .mapa .loc{color:var(--muted);font-size:.95rem;margin-bottom:14px}
  .side{position:sticky;top:90px;align-self:start}
  .card-price{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px}
  .card-price small{color:var(--muted);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase}
  .card-price .val{font-family:'Cormorant Garamond',serif;font-size:2.6rem;color:var(--cream);font-weight:600;line-height:1.1;margin:2px 0 4px}
  .card-price .per{color:var(--muted);font-size:.85rem}
  .facts{list-style:none;margin:20px 0;border-top:1px solid var(--line);padding-top:18px}
  .facts li{display:flex;justify-content:space-between;gap:12px;padding:7px 0;font-size:.92rem}
  .facts li span{color:var(--muted)}
  .facts li b{color:var(--cream);font-weight:500;text-align:right}
  .card-price .btn{width:100%;justify-content:center;margin-top:6px}
  .card-price .wa{background:#25d366;border-color:#25d366;color:#062b14}
  .card-price .wa:hover{background:#2fe673}
  .reassure{font-size:.8rem;color:var(--muted);text-align:center;margin-top:14px}
  .lb{position:fixed;inset:0;z-index:100;background:rgba(8,8,10,.96);display:none;align-items:center;justify-content:center}
  .lb.open{display:flex}
  .lb img{max-width:92vw;max-height:86vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .lb .x{position:absolute;top:18px;right:24px;color:#fff;font-size:2rem;cursor:pointer;line-height:1;background:none;border:0}
  .lb .arr{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#fff;width:50px;height:50px;border-radius:50%;font-size:1.5rem;cursor:pointer;display:grid;place-items:center}
  .lb .arr:hover{background:rgba(201,162,75,.25)}
  .lb .prev{left:22px}.lb .next{right:22px}
  .lb .cap{position:absolute;bottom:22px;left:0;right:0;text-align:center;color:#cfcabb;font-size:.85rem}
  footer{background:#08080a;border-top:1px solid var(--line);padding:36px 0;text-align:center;color:var(--muted);font-size:.85rem;margin-top:20px}
  footer a{color:var(--gold)}
  .wa-float{position:fixed;bottom:22px;right:22px;z-index:60;background:#25d366;width:56px;height:56px;border-radius:50%;display:grid;place-items:center;box-shadow:0 8px 24px rgba(0,0,0,.4);transition:.25s}
  .wa-float:hover{transform:scale(1.08)}
  .wa-float svg{width:30px;height:30px;fill:#fff}
  .nf{text-align:center;padding:160px 20px 120px}
  .nf h1{font-size:2.4rem;margin-bottom:14px}
  .nf p{color:var(--muted);margin-bottom:26px}
  @media(max-width:860px){
    .layout{grid-template-columns:1fr;gap:30px}
    .side{position:static}
    .inclusos{grid-template-columns:1fr}
    .galeria{grid-template-columns:1fr}
    .galeria .feat img,.galeria .g-item img{height:260px}
    .hero{height:70vh}
  }
</style>
</head>
<body>

<header id="hdr">
  <div class="wrap nav">
    <a href="index.html" class="brand"><span class="mark">✦</span> Viajas Comigo</a>
    <a href="index.html#viagens" class="back">← Todas as viagens</a>
  </div>
</header>

<main id="conteudo"></main>

<div class="lb" id="lb">
  <button class="x" id="lb-x" aria-label="Fechar">×</button>
  <button class="arr prev" id="lb-prev" aria-label="Anterior">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="arr next" id="lb-next" aria-label="Próxima">›</button>
  <div class="cap" id="lb-cap"></div>
</div>

<footer>
  <div class="wrap">
    Viajas Comigo · <a href="https://instagram.com/viajascomigo" target="_blank" rel="noopener">@viajascomigo</a> · <a href="index.html">Voltar ao início</a>
  </div>
</footer>
